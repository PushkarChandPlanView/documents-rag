worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ─────────────────────────────────────────────────────────────────────────
    # Upstreams
    # ─────────────────────────────────────────────────────────────────────────
    upstream api_gateway {
        server api_gateway:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main server
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 110M;  # Slightly above MAX_UPLOAD_SIZE_MB

        # REST API
        location /api/ {
            proxy_pass http://api_gateway/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # WebSocket (document processing status)
        location /ws/ {
            proxy_pass http://api_gateway/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # SSE streaming (chat)
        location /api/chat {
            proxy_pass http://api_gateway/api/chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        # React SPA (serves index.html for all non-API routes)
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
