version: "3.9"

x-common-env: &common-env
  env_file: .env

x-aws-env: &aws-env
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  ollama_models:
  kafka_data:
  zookeeper_data:

services:

  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docstore}
      POSTGRES_USER: ${POSTGRES_USER:-docstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docstore} -d ${POSTGRES_DB:-docstore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/create-topics.sh:/create-topics.sh:ro
    networks: [internal]
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    restart: "no"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9091"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9091:9091"  # console only
    networks: [internal, public]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infrastructure/minio/init-buckets.sh:/init-buckets.sh:ro
    networks: [internal]
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
      - ./infrastructure/ollama/pull-models.sh:/pull-models.sh:ro
    networks: [internal]
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "4"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          memory: 4G

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_models:/root/.ollama
      - ./infrastructure/ollama/pull-models.sh:/pull-models.sh:ro
    entrypoint: ["/bin/bash", "/pull-models.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    env_file: .env
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────────
  # Backend Services
  # ─────────────────────────────────────────────────────────────────────────

  api_gateway:
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal, public]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  worker_text_extraction:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      WORKER_TYPE: text_extraction
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  worker_chunking:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      WORKER_TYPE: chunking
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker_embedding:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      <<: *aws-env
      WORKER_TYPE: embedding
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  worker_summarization:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      <<: *aws-env
      WORKER_TYPE: summarization
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker_compliance:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      <<: *aws-env
      WORKER_TYPE: compliance
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker_compliance_rag:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      <<: *aws-env
      WORKER_TYPE: compliance_rag
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [internal]
    deploy:
      replicas: 0
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  rag_service:
    build:
      context: ./backend/rag_service
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *common-env
    environment:
      <<: *aws-env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend + Reverse Proxy
  # ─────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws
    restart: unless-stopped
    networks: [public]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - internal
      - public

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway
      - frontend
    networks: [public]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
